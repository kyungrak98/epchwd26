<html lang="ko">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f0fc;
            overflow-x: hidden;
            /* 모바일 터치 드래그 시 고무줄 효과 방지 및 터치 최적화 */
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Animated liquid abstract shapes for liquid glass style */
        .liquid-bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4efe9 100%);
        }

        .liquid-blob {
            position: absolute;
            filter: blur(60px); 
            opacity: 0.55;
            mix-blend-mode: multiply;
            animation: floatBubble 25s infinite alternate ease-in-out;
            will-change: transform; /* 브라우저에 하드웨어 가속 알림 */
        }

        .blob-pink {
            background: radial-gradient(circle, rgba(255,182,193,0.7) 0%, rgba(255,135,180,0) 70%);
            width: 350px; /* 모바일 화면 비례 크기 축소 */
            height: 350px;
            top: -5%;
            left: -10%;
            animation-duration: 20s;
        }

        .blob-blue {
            background: radial-gradient(circle, rgba(160,211,250,0.7) 0%, rgba(135,206,250,0) 70%);
            width: 400px;
            height: 400px;
            bottom: -10%;
            right: -10%;
            animation-duration: 28s;
            animation-delay: -5s;
        }

        .blob-purple {
            background: radial-gradient(circle, rgba(216,191,244,0.6) 0%, rgba(186,85,211,0) 70%);
            width: 300px;
            height: 300px;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 24s;
            animation-delay: -10s;
        }

        .blob-orange {
            background: radial-gradient(circle, rgba(255,223,186,0.6) 0%, rgba(255,160,122,0) 70%);
            width: 350px;
            height: 350px;
            top: 10%;
            right: 5%;
            animation-duration: 32s;
            animation-delay: -3s;
        }

        @keyframes floatBubble {
            0% {
                transform: translate(0px, 0px) scale(1) rotate(0deg);
                border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
            }
            33% {
                transform: translate(25px, -30px) scale(1.1) rotate(30deg);
                border-radius: 70% 30% 52% 48% / 60% 40% 60% 40%;
            }
            66% {
                transform: translate(-15px, 20px) scale(0.95) rotate(-45deg);
                border-radius: 50% 50% 40% 60% / 40% 60% 50% 50%;
            }
            100% {
                transform: translate(0px, 0px) scale(1) rotate(0deg);
                border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
            }
        }

        /* Glassmorphism custom rules */
        .glass-panel {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: 0 4px 20px 0 rgba(142, 134, 179, 0.08);
        }

        .glass-panel-heavy {
            background: rgba(255, 255, 255, 0.68);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.55);
            box-shadow: 0 8px 32px 0 rgba(142, 134, 179, 0.12);
        }

        /* Question Card Style */
        .glass-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.55);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 20px rgba(121, 95, 226, 0.06);
        }

        /* Roulette rolling blink state */
        .roulette-active {
            border-color: #6366f1 !important;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.45) !important;
            transform: scale(1.015) !important;
            background: rgba(255, 255, 255, 0.85) !important;
        }

        /* Final chosen spotlight state */
        .spotlight-chosen {
            border-color: transparent !important;
            background: linear-gradient(rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.92)) padding-box,
                        linear-gradient(135deg, #ff007f, #7f00ff, #00f0ff) border-box !important;
            border: 2.5px solid transparent !important;
            box-shadow: 0 0 25px rgba(127, 0, 255, 0.35) !important;
            transform: scale(1.025) !important;
            animation: pulseGlow 1.8s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 18px rgba(127, 0, 255, 0.25); }
            100% { box-shadow: 0 0 30px rgba(255, 0, 127, 0.4); }
        }

        /* Page slide transitions */
        .fade-in-slide {
            animation: fadeInSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInSlide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom swipe navigation tabs indicator on mobile */
        .scrollbar-hidden::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hidden {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 깔끔해진 텍스트 자체 강조 효과 */
        .text-emphasis-highlight {
            font-weight: 900;
            color: #4f46e5;
            text-shadow: 0 0 1px rgba(79, 70, 229, 0.1);
        }

        /* 📱 모바일 기기 고성능/발열 제어를 위한 미디어 쿼리 정의 [Inference] */
        @media (max-width: 640px) {
            /* 1. 이중 블러 연산 부하를 제어하기 위해 모바일 내 유리창 블러 값 대폭 축소 */
            .glass-panel {
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                background: rgba(255, 255, 255, 0.65); /* 블러를 줄이는 대신 불투명도를 높여 디자인 균형 유지 [Inference] */
            }
            .glass-panel-heavy {
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                background: rgba(255, 255, 255, 0.82);
            }
            .glass-card {
                backdrop-filter: blur(5px);
                -webkit-backdrop-filter: blur(5px);
                background: rgba(255, 255, 255, 0.55);
            }

            /* 2. 연산 영역 분할을 가속화하기 위해 모바일에서 배경 구체 개수를 4개 -> 2개로 물리적 격리 [Inference] */
            .blob-purple, .blob-orange {
                display: none !important;
            }

            /* 3. 남아있는 모바일 구체들의 블러 범위 완화 및 부드러운 하향 속도 조정 [Inference] */
            .liquid-blob {
                filter: blur(35px) !important;
                animation-duration: 45s !important; /* 움직임을 정밀하게 제어해 프레임 레이트 안정화 [Inference] */
            }
        }
    </style>
</head>

        let currentCategoryIndex = 0;
        let isRouletteRunning = false;

        window.onload = function() {
            renderActiveCategory();
        };

        // Render current active layout
        function renderActiveCategory() {
            const currentCat = sharingData[currentCategoryIndex];
            
            // Step 1: Active Nav Tabs Selection highlight styling (Mobile Responsive sizing)
            document.querySelectorAll(".tab-btn").forEach((btn, index) => {
                if(index === currentCategoryIndex) {
                    btn.className = "tab-btn shrink-0 md:flex-1 min-w-[110px] sm:min-w-[120px] text-center py-2 px-2.5 rounded-lg text-xs md:text-sm font-black transition-all duration-300 flex items-center justify-center gap-1.5 bg-white text-indigo-700 shadow-sm border border-indigo-100/40";
                    // 탭 포커스 자동 세로 중앙 스크롤 이동 지원
                    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    btn.className = "tab-btn shrink-0 md:flex-1 min-w-[110px] sm:min-w-[120px] text-center py-2 px-2.5 rounded-lg text-xs md:text-sm font-bold transition-all duration-300 flex items-center justify-center gap-1.5 text-slate-600 hover:bg-white/40 hover:text-indigo-600";
                }
            });

            // Step 2: Set category-level dynamics with nice soft screen transition
            const container = document.getElementById("category-page-container");
            container.classList.remove("fade-in-slide");
            void container.offsetWidth; // force redraw/reflow
            container.classList.add("fade-in-slide");

            document.getElementById("cat-title").innerText = currentCat.title;
            
            const badge = document.getElementById("cat-badge");
            badge.innerText = currentCat.badge;
            badge.className = `px-2 py-0.5 rounded-full text-[10px] font-bold shadow-sm ${currentCat.badgeClass}`;

            document.getElementById("cat-step-indicator").innerText = `전체 중 ${currentCat.id}단계 카테고리`;

            const iconContainer = document.getElementById("cat-icon-container");
            iconContainer.className = `w-11 h-11 sm:w-14 sm:h-14 rounded-xl flex items-center justify-center text-lg sm:text-2xl shadow-inner text-white bg-gradient-to-tr ${currentCat.gradientIcon} shadow-md shrink-0`;
            iconContainer.innerHTML = `<i class="${currentCat.icon}"></i>`;

            // Step 3: Render 4 Simple static clean question cards
            const grid = document.getElementById("questions-grid");
            grid.innerHTML = "";

            currentCat.questions.forEach((q, qIndex) => {
                const qCard = document.createElement("div");
                qCard.id = `q-card-${qIndex}`;
                qCard.className = "glass-card rounded-2xl p-4 sm:p-5 md:p-6 flex flex-col justify-between min-h-0 sm:min-h-[140px] border border-white/40 shadow-sm transition-all duration-500";

                qCard.innerHTML = `
                    <div>
                        <span class="text-[10px] sm:text-xs font-extrabold text-indigo-400 mb-1 sm:mb-2 block uppercase tracking-wide">${q.qid}</span>
                        <p class="text-[13px] sm:text-[15px] md:text-base font-bold text-slate-800 leading-relaxed">${q.text}</p>
                    </div>
                `;
                grid.appendChild(qCard);
            });
        }

        function changeCategory(index) {
            if (isRouletteRunning) return;
            currentCategoryIndex = index;
            renderActiveCategory();
        }

        function nextCategory() {
            if (isRouletteRunning) return;
            if(currentCategoryIndex < sharingData.length - 1) {
                currentCategoryIndex++;
                renderActiveCategory();
            } else {
                currentCategoryIndex = 0;
                renderActiveCategory();
            }
        }

        function prevCategory() {
            if (isRouletteRunning) return;
            if(currentCategoryIndex > 0) {
                currentCategoryIndex--;
                renderActiveCategory();
            } else {
                currentCategoryIndex = sharingData.length - 1;
                renderActiveCategory();
            }
        }

        // 🎲 Roulette Raffle picking animation
        function rollRandomQuestion() {
            if (isRouletteRunning) return;
            isRouletteRunning = true;

            const totalQuestionsCount = 4;
            let currentHighlightIndex = 0;
            let speed = 70;
            let stepCount = 0;
            const totalSteps = 20 + Math.floor(Math.random() * 8);

            // Clean previous spotlights
            for(let i=0; i<totalQuestionsCount; i++) {
                const card = document.getElementById(`q-card-${i}`);
                if(card) {
                    card.className = "glass-card rounded-2xl p-4 sm:p-5 md:p-6 flex flex-col justify-between min-h-0 sm:min-h-[140px] border border-white/40 shadow-sm transition-all duration-500";
                }
            }

            // Highlighting cycle animation loop
            function cycleHighlight() {
                for(let i=0; i<totalQuestionsCount; i++) {
                    const card = document.getElementById(`q-card-${i}`);
                    if(card) card.classList.remove("roulette-active");
                }

                const targetCard = document.getElementById(`q-card-${currentHighlightIndex}`);
                if (targetCard) targetCard.classList.add("roulette-active");

                stepCount++;

                if (stepCount < totalSteps) {
                    if (stepCount > totalSteps * 0.8) {
                        speed += 85; 
                    } else if (stepCount > totalSteps * 0.5) {
                        speed += 45;
                    }
                    currentHighlightIndex = (currentHighlightIndex + 1) % totalQuestionsCount;
                    setTimeout(cycleHighlight, speed);
                } else {
                    const finalIndex = currentHighlightIndex;
                    setTimeout(() => {
                        const finalCard = document.getElementById(`q-card-${finalIndex}`);
                        if(finalCard) {
                            finalCard.classList.remove("roulette-active");
                            finalCard.classList.add("spotlight-chosen");
                            finalCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                        isRouletteRunning = false;
                        playWinnerBeep();
                    }, 100);
                }
            }

            cycleHighlight();
        }

        // Clean synthesized chimes feedback
        function playWinnerBeep() {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                const gain = context.createGain();
                osc.connect(gain);
                gain.connect(context.destination);
                osc.type = "sine";
                osc.frequency.setValueAtTime(523.25, context.currentTime); 
                gain.gain.setValueAtTime(0.4, context.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 1.0);
                osc.start();
                osc.stop(context.currentTime + 1.0);
            } catch (e) {
                console.log("Audio Context Blocked:", e);
            }
        }

        // Modal Widget - Member selector controller 
        function openSpinnerModal() {
            document.getElementById("spinner-modal").classList.remove("hidden");
        }
        function closeSpinnerModal() {
            document.getElementById("spinner-modal").classList.add("hidden");
        }

        function spinMemberSelector() {
            const inputVal = document.getElementById("spinner-names-input").value;
            const namesArray = inputVal.split(",").map(n => n.trim()).filter(n => n !== "");
            const visualBox = document.getElementById("spinner-visual-box");

            if(namesArray.length === 0) {
                visualBox.innerHTML = "<span class='text-rose-500'>이름을 한 개 이상 적어주세요!</span>";
                return;
            }

            let duration = 2400;
            let speed = 60;
            let elapsed = 0;
            
            visualBox.className = "text-base sm:text-xl font-black text-indigo-600 animate-pulse transition-all";

            // Run shuffling animation of names list
            function runShuffle() {
                const randomIndex = Math.floor(Math.random() * namesArray.length);
                const selectedName = namesArray[randomIndex];
                visualBox.innerHTML = `🎲 <span class="bg-indigo-100/60 px-3 py-1 rounded-xl border border-indigo-200">${selectedName}</span>`;

                elapsed += speed;
                if(elapsed < duration) {
                    if (elapsed > duration * 0.7) speed = 200;
                    else if (elapsed > duration * 0.4) speed = 120;
                    setTimeout(runShuffle, speed);
                } else {
                    visualBox.className = "text-lg sm:text-2xl font-black text-slate-800 transition-all";
                    
                    try {
                        const context = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = context.createOscillator();
                        const gain = context.createGain();
                        osc.connect(gain);
                        gain.connect(context.destination);
                        osc.frequency.setValueAtTime(587.33, context.currentTime); 
                        gain.gain.setValueAtTime(0.3, context.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.6);
                        osc.start();
                        osc.stop(context.currentTime + 0.6);
                    } catch(err) {}

                    visualBox.innerHTML = `
                        <div class="flex flex-col items-center gap-1">
                            <span class="text-[10px] font-bold text-slate-400">이번 차례 나눔 주인공!</span>
                            <span class="text-2xl sm:text-3xl bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-transparent font-black tracking-tight drop-shadow-sm">
                                🎉 ${selectedName}
                            </span>
                        </div>
                    `;
                }
            }
            setTimeout(runShuffle, speed);
        }
