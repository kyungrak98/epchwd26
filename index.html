<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>젊은이예배 2026 상반기 웰커밍데이 나눔 카드</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- 이미지 로드 관련 함수들을 head로 이동하여 정의되지 않은 오류(ReferenceError)를 방지합니다. -->
    <script>
        function handleLogoLoad() {
            const img = document.getElementById("church-logo-img");
            const fallback = document.getElementById("church-logo-fallback");
            if (img && fallback) {
                img.classList.remove("hidden");
                fallback.classList.add("hidden");
            }
        }

        function handleLogoError() {
            const img = document.getElementById("church-logo-img");
            const fallback = document.getElementById("church-logo-fallback");
            if (img && fallback) {
                img.classList.add("hidden");
                fallback.classList.remove("hidden");
            }
        }
    </script>

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f0fc;
            overflow-x: hidden;
            /* 모바일 터치 드래그 시 고무줄 효과 방지 및 터치 최적화 */
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Animated liquid abstract shapes for liquid glass style */
        .liquid-bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4efe9 100%);
        }

        .liquid-blob {
            position: absolute;
            filter: blur(60px); /* 모바일 렌더링 성능을 위해 블러 강도를 80px에서 60px로 소폭 완화 */
            opacity: 0.55;
            mix-blend-mode: multiply;
            animation: floatBubble 25s infinite alternate ease-in-out;
            will-change: transform; /* 브라우저에 하드웨어 가속 알림 */
        }

        .blob-pink {
            background: radial-gradient(circle, rgba(255,182,193,0.7) 0%, rgba(255,135,180,0) 70%);
            width: 350px; /* 모바일 화면 비례 크기 축소 */
            height: 350px;
            top: -5%;
            left: -10%;
            animation-duration: 20s;
        }

        .blob-blue {
            background: radial-gradient(circle, rgba(160,211,250,0.7) 0%, rgba(135,206,250,0) 70%);
            width: 400px;
            height: 400px;
            bottom: -10%;
            right: -10%;
            animation-duration: 28s;
            animation-delay: -5s;
        }

        .blob-purple {
            background: radial-gradient(circle, rgba(216,191,244,0.6) 0%, rgba(186,85,211,0) 70%);
            width: 300px;
            height: 300px;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 24s;
            animation-delay: -10s;
        }

        .blob-orange {
            background: radial-gradient(circle, rgba(255,223,186,0.6) 0%, rgba(255,160,122,0) 70%);
            width: 350px;
            height: 350px;
            top: 10%;
            right: 5%;
            animation-duration: 32s;
            animation-delay: -3s;
        }

        @keyframes floatBubble {
            0% {
                transform: translate(0px, 0px) scale(1) rotate(0deg);
                border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
            }
            33% {
                transform: translate(25px, -30px) scale(1.1) rotate(30deg);
                border-radius: 70% 30% 52% 48% / 60% 40% 60% 40%;
            }
            66% {
                transform: translate(-15px, 20px) scale(0.95) rotate(-45deg);
                border-radius: 50% 50% 40% 60% / 40% 60% 50% 50%;
            }
            100% {
                transform: translate(0px, 0px) scale(1) rotate(0deg);
                border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
            }
        }

        /* Glassmorphism custom rules */
        .glass-panel {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: 0 4px 20px 0 rgba(142, 134, 179, 0.08);
        }

        .glass-panel-heavy {
            background: rgba(255, 255, 255, 0.68);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.55);
            box-shadow: 0 8px 32px 0 rgba(142, 134, 179, 0.12);
        }

        /* Question Card Style */
        .glass-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.55);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 20px rgba(121, 95, 226, 0.06);
        }

        /* Roulette rolling blink state */
        .roulette-active {
            border-color: #6366f1 !important;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.45) !important;
            transform: scale(1.015) !important;
            background: rgba(255, 255, 255, 0.85) !important;
        }

        /* Final chosen spotlight state */
        .spotlight-chosen {
            border-color: transparent !important;
            background: linear-gradient(rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.92)) padding-box,
                        linear-gradient(135deg, #ff007f, #7f00ff, #00f0ff) border-box !important;
            border: 2.5px solid transparent !important;
            box-shadow: 0 0 25px rgba(127, 0, 255, 0.35) !important;
            transform: scale(1.025) !important;
            animation: pulseGlow 1.8s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 18px rgba(127, 0, 255, 0.25); }
            100% { box-shadow: 0 0 30px rgba(255, 0, 127, 0.4); }
        }

        /* Page slide transitions */
        .fade-in-slide {
            animation: fadeInSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInSlide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom swipe navigation tabs indicator on mobile */
        .scrollbar-hidden::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hidden {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 깔끔해진 텍스트 자체 강조 효과 */
        .text-emphasis-highlight {
            font-weight: 900;
            color: #4f46e5;
            text-shadow: 0 0 1px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col justify-between antialiased">

    <!-- Liquid Gradient Background elements -->
    <div class="liquid-bg-wrapper transform-gpu">
        <div class="liquid-blob blob-pink"></div>
        <div class="liquid-blob blob-blue"></div>
        <div class="liquid-blob blob-purple"></div>
        <div class="liquid-blob blob-orange"></div>
    </div>

    <!-- Header Section -->
    <header class="w-full max-w-6xl mx-auto px-3 sm:px-4 pt-4 sm:pt-6 pb-1">
        <div class="glass-panel rounded-2xl py-3 px-4 flex flex-row items-center justify-between gap-3 shadow-sm">
            <!-- Brand Logo / Title -->
            <div class="flex items-center gap-3">
                <!-- Integrated Church Logo Container (구조 수정 부분) -->
                <div class="relative w-10 h-10 sm:w-11 sm:h-11 rounded-full overflow-hidden border-2 border-white/60 bg-white/40 flex items-center justify-center shadow-sm shrink-0">
                    <!-- 기본 십자가 백그라운드 아이콘 (기본 탑재, 이미지가 나타나면 스크립트로 차단됨) -->
                    <span id="church-logo-fallback" class="text-indigo-600 text-lg font-black absolute inset-0 flex items-center justify-center">✝</span>
                    <!-- 로고 이미지 (성공 로드 시 handleLogoLoad 실행하여 십자가를 안전하게 가림) -->
                    <img id="church-logo-img" src="epchyouthlogo.jpg" alt="은평교회 로고" class="absolute inset-0 w-full h-full object-cover hidden" onload="handleLogoLoad()" onerror="handleLogoError()">
                </div>
                <div>
                    <h1 class="text-[15px] sm:text-lg md:text-xl font-extrabold tracking-tight bg-gradient-to-r from-purple-600 via-indigo-600 to-blue-600 bg-clip-text text-transparent leading-snug">
                        젊은이예배 2026 상반기 웰커밍데이
                    </h1>
                </div>
            </div>

            <!-- Global Action Indicators -->
            <div class="shrink-0">
                <button onclick="openSpinnerModal()" class="px-3 py-2 glass-card rounded-xl text-xs font-bold text-slate-700 flex items-center gap-1.5 hover:text-indigo-600 shadow-sm active:scale-95 transition-transform">
                    <i class="fa-solid fa-dice text-indigo-500 text-xs"></i> <span class="hidden xs:inline">순서</span> 지목기
                </button>
            </div>
        </div>
    </header>

    <!-- Category Tabs Navigation -->
    <nav class="w-full max-w-6xl mx-auto px-3 sm:px-4 my-1.5">
        <div class="relative">
            <!-- Fade Indicators for Scrollable Content on Mobile -->
            <div class="absolute left-0 top-0 bottom-0 w-4 bg-gradient-to-r from-[#f3f0fc] to-transparent pointer-events-none md:hidden z-10"></div>
            <div class="absolute right-0 top-0 bottom-0 w-4 bg-gradient-to-l from-[#f3f0fc] to-transparent pointer-events-none md:hidden z-10"></div>
            
            <div class="glass-panel rounded-xl p-1 flex flex-nowrap overflow-x-auto scrollbar-hidden gap-1 items-center justify-start md:justify-between shadow-sm overscroll-x-contain scroll-smooth">
                <button onclick="changeCategory(0)" id="tab-0" class="tab-btn shrink-0 md:flex-1 min-w-[110px] sm:min-w-[120px] text-center py-2 px-2.5 rounded-lg text-xs md:text-sm font-bold transition-all duration-300 flex items-center justify-center gap-1.5 text-slate-600 hover:bg-white/40">
                    <span class="w-4 h-4 rounded bg-pink-100 text-pink-500 flex items-center justify-center text-[10px] font-black">1</span>
                    <span>자기소개</span>
                </button>
                <button onclick="changeCategory(1)" id="tab-1" class="tab-btn shrink-0 md:flex-1 min-w-[110px] sm:min-w-[120px] text-center py-2 px-2.5 rounded-lg text-xs md:text-sm font-bold transition-all duration-300 flex items-center justify-center gap-1.5 text-slate-600 hover:bg-white/40">
                    <span class="w-4 h-4 rounded bg-blue-100 text-blue-500 flex items-center justify-center text-[10px] font-black">2</span>
                    <span>신앙 & 관계</span>
                </button>
                <button onclick="changeCategory(2)" id="tab-2" class="tab-btn shrink-0 md:flex-1 min-w-[110px] sm:min-w-[120px] text-center py-2 px-2.5 rounded-lg text-xs md:text-sm font-bold transition-all duration-300 flex items-center justify-center gap-1.5 text-slate-600 hover:bg-white/40">
                    <span class="w-4 h-4 rounded bg-purple-100 text-purple-500 flex items-center justify-center text-[10px] font-black">3</span>
                    <span>일상 & 고민</span>
                </button>
                <button onclick="changeCategory(3)" id="tab-3" class="tab-btn shrink-0 md:flex-1 min-w-[110px] sm:min-w-[120px] text-center py-2 px-2.5 rounded-lg text-xs md:text-sm font-bold transition-all duration-300 flex items-center justify-center gap-1.5 text-slate-600 hover:bg-white/40">
                    <span class="w-4 h-4 rounded bg-orange-100 text-orange-500 flex items-center justify-center text-[10px] font-black">4</span>
                    <span>연애 & 결혼</span>
                </button>
                <button onclick="changeCategory(4)" id="tab-4" class="tab-btn shrink-0 md:flex-1 min-w-[110px] sm:min-w-[120px] text-center py-2 px-2.5 rounded-lg text-xs md:text-sm font-bold transition-all duration-300 flex items-center justify-center gap-1.5 text-slate-600 hover:bg-white/40">
                    <span class="w-4 h-4 rounded bg-emerald-100 text-emerald-500 flex items-center justify-center text-[10px] font-black">5</span>
                    <span>꿈 & 방향성</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="w-full max-w-6xl mx-auto px-3 sm:px-4 flex-1 py-2 sm:py-3 flex flex-col justify-center">
        <!-- Content Panel -->
        <div id="category-page-container" class="glass-panel-heavy rounded-2xl p-4 sm:p-6 md:p-8 shadow-xl transition-all duration-500 min-h-0 sm:min-h-[480px] flex flex-col justify-between gap-4">
            
            <!-- Category Header -->
            <div id="cat-header-section" class="flex flex-col sm:flex-row justify-between items-stretch sm:items-center border-b border-white/40 pb-4 gap-3">
                <div class="flex items-center gap-3">
                    <div id="cat-icon-container" class="w-11 h-11 sm:w-14 sm:h-14 rounded-xl flex items-center justify-center text-lg sm:text-2xl shadow-inner text-white shrink-0">
                        <!-- Loaded dynamically via JS -->
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-0.5">
                            <span id="cat-badge" class="px-2 py-0.5 rounded-full text-[10px] font-bold shadow-sm">
                                <!-- Loaded dynamically via JS -->
                            </span>
                            <span class="text-[10px] sm:text-xs text-slate-500 font-medium" id="cat-step-indicator">
                                1 of 5 Categories
                            </span>
                        </div>
                        <h2 id="cat-title" class="text-base sm:text-xl md:text-2xl font-black text-slate-800 tracking-tight leading-tight">
                            <!-- Loaded dynamically via JS -->
                        </h2>
                    </div>
                </div>
                <!-- Interactive Actions -->
                <div class="w-full sm:w-auto shrink-0">
                    <button onclick="rollRandomQuestion()" class="w-full sm:w-auto px-4 py-2.5 sm:py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl text-xs sm:text-sm font-bold flex items-center justify-center gap-1.5 hover:from-indigo-600 hover:to-purple-700 transition-all shadow-sm active:scale-95">
                        <i class="fa-solid fa-dice animate-spin" style="animation-duration: 4s;"></i> 이 카테고리 랜덤 질문 뽑기!
                    </button>
                </div>
            </div>

            <!-- Static Questions Grid Layout -->
            <div id="questions-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4 md:gap-5 my-1">
                <!-- 4 Questions rendered here statically -->
            </div>

            <!-- Footer-like Interactive Help Tips & Navigation controls -->
            <div class="flex flex-col sm:flex-row items-stretch sm:items-center justify-between pt-3 border-t border-white/40 gap-3">
                <div class="text-[11px] text-slate-500 max-w-md hidden sm:block bg-white/20 px-3.5 py-2 rounded-xl border border-white/20">
                    💡 상단의 <strong class="text-indigo-600">랜덤 질문 뽑기</strong>를 누르면 하나의 질문이 랜덤으로 스포트라이트 됩니다.
                </div>

                <div class="grid grid-cols-2 sm:flex sm:items-center gap-2 w-full sm:w-auto">
                    <button onclick="prevCategory()" class="px-3 py-2.5 sm:px-5 sm:py-3 glass-card rounded-xl text-slate-700 font-bold text-xs sm:text-sm hover:text-indigo-600 flex items-center justify-center gap-1.5 active:scale-95 transition-transform">
                        <i class="fa-solid fa-arrow-left text-[10px]"></i> 이전 카테고리
                    </button>
                    <button onclick="nextCategory()" class="px-3 py-2.5 sm:px-6 sm:py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-bold text-xs sm:text-sm shadow-md shadow-indigo-300/30 hover:from-indigo-600 hover:to-purple-700 transition-all duration-300 flex items-center justify-center gap-1.5 active:scale-95 transition-transform">
                        다음 카테고리 <i class="fa-solid fa-arrow-right text-[10px]"></i>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <!-- Random Member Selector Modal -->
    <div id="spinner-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-3 sm:p-4">
        <div class="absolute inset-0 bg-slate-900/30 backdrop-blur-sm" onclick="closeSpinnerModal()"></div>
        <div class="relative glass-panel-heavy rounded-2xl w-full max-w-sm sm:max-w-md p-5 sm:p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
            <button onclick="closeSpinnerModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-700 transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
            
            <div class="text-center mb-4">
                <i class="fa-solid fa-dice-five text-3xl sm:text-4xl text-purple-500 mb-1.5"></i>
                <h3 class="text-base sm:text-lg font-bold text-slate-800">아이스브레이킹: 순서 지목기</h3>
                <p class="text-[11px] sm:text-xs text-slate-500">누가 먼저 나눔을 시작할지 랜덤으로 정해 드립니다!</p>
            </div>

            <!-- Input names list -->
            <div class="mb-4">
                <label class="block text-[11px] sm:text-xs font-bold text-slate-600 mb-1">조원 이름 목록 (쉼표로 구분)</label>
                <div class="flex gap-2">
                    <input id="spinner-names-input" type="text" value="김요한, 이사랑, 박은혜, 최온유, 정희망" class="w-full px-3 py-2 text-xs sm:text-sm bg-white/50 border border-purple-200 rounded-xl focus:outline-none focus:border-purple-500 text-slate-800">
                </div>
            </div>

            <!-- Spin Area display -->
            <div class="relative bg-white/15 rounded-xl p-4 sm:p-6 border border-white/50 flex flex-col items-center justify-center min-h-[110px] sm:min-h-[140px] mb-4">
                <div id="spinner-visual-box" class="text-sm sm:text-base font-extrabold text-slate-700 tracking-tight text-center transition-all duration-300 leading-relaxed">
                    🎯 버튼을 눌러 순서를 지목해보세요!
                </div>
            </div>

            <!-- Spin Button action -->
            <div class="flex gap-2">
                <button onclick="spinMemberSelector()" class="w-full py-3 bg-gradient-to-r from-purple-500 to-indigo-600 text-white font-bold rounded-xl text-xs sm:text-sm shadow-sm hover:from-purple-600 hover:to-indigo-700 transition-all flex items-center justify-center gap-1.5 active:scale-95">
                    <i class="fa-solid fa-shuffle"></i> 랜덤 지목하기!
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="w-full max-w-6xl mx-auto px-3 sm:px-4 py-4 sm:py-5 text-center text-slate-500 text-[10px] border-t border-white/20 mt-4 flex flex-col md:flex-row items-center justify-between gap-2">
        <div class="order-2 md:order-1">
            © 2026 <strong>은평교회 젊은이
